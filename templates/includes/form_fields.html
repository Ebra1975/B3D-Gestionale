{% for field in form %}
  <div class="form-field{% if field.errors %} has-error{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
      <p class="help-text">{{ field.help_text }}</p>
    {% endif %}
    {% for error in field.errors %}
      <p class="error-text">{{ error }}</p>
    {% endfor %}
  </div>
{% endfor %}
